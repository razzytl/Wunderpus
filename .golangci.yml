linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - gosimple
    - ineffassign
    - unused
    - misspell

linters-settings:
  errcheck:
    check-type-assertions: true
  govet:
    enable-all: true

run:
  timeout: 5m
  go: "1.21"

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
