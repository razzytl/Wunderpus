# golangci-lint configuration (v1 schema)
# NOTE: Do NOT add a top-level "version:" key. CI uses golangci-lint v1.64.1
# which does not support the "version" field (that is a v2-only feature).
# Adding it causes: jsonschema: "" does not validate: additional properties 'version' not allowed

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true
  exhaustive:
    default-signifies-exhaustive: true
  funlen:
    lines: 120
    statements: 40
  gocognit:
    min-complexity: 25
  gocyclo:
    min-complexity: 20
  govet:
    enable-all: true
    disable:
      - fieldalignment
  lll:
    line-length: 120
    tab-width: 4
  misspell:
    locale: US
  mnd:
    checks:
      - argument
      - assign
      - case
      - condition
      - operation
      - return
  nakedret:
    max-func-lines: 3
  revive:
    enable-all-rules: true
    rules:
      - name: add-constant
        disabled: true
      - name: argument-limit
        arguments:
          - 7
        severity: warning
      - name: banned-characters
        disabled: true
      - name: cognitive-complexity
        disabled: true
      - name: comment-spacings
        arguments:
          - nolint
        severity: warning
      - name: cyclomatic
        disabled: true
      - name: file-header
        disabled: true
      - name: function-result-limit
        arguments:
          - 3
        severity: warning
      - name: function-length
        disabled: true
      - name: line-length-limit
        disabled: true
      - name: max-public-structs
        disabled: true
      - name: modifies-value-receiver
        disabled: true
      - name: package-comments
        disabled: true
      - name: unused-receiver
        disabled: true

linters:
  enable-all: true
  disable:
    - containedctx
    - contextcheck
    - cyclop
    - depguard
    - dupword
    - err113
    - errcheck
    - errchkjson
    - errorlint
    - exhaustive
    - exhaustruct
    - forbidigo
    - forcetypeassert
    - funlen
    - gochecknoglobals
    - gochecknoinits
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - godot
    - godox
    - gosec
    - ineffassign
    - intrange
    - ireturn
    - lll
    - maintidx
    - mnd
    - nestif
    - nilnil
    - nlreturn
    - noctx
    - nonamedreturns
    - paralleltest
    - perfsprint
    - revive
    - staticcheck
    - tagalign
    - tagliatelle
    - testifylint
    - testpackage
    - thelper
    - unparam
    - usestdlibvars
    - usetesting
    - varnamelen
    - wrapcheck
    - wsl