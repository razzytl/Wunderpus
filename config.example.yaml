# Wonderpus Configuration
# Copy to config.yaml and fill in your API keys

# ═══════════════════════════════════════════════════════════════════
# MODEL LIST — Vendor-agnostic model configuration (RECOMMENDED)
# ═══════════════════════════════════════════════════════════════════
# Add any provider with zero code changes. Protocol is auto-detected
# from the model prefix, or set explicitly via "protocol".
#
# Supported protocols:
#   openai     — OpenAI, OpenRouter, Groq, Together, Mistral, vLLM, etc.
#   anthropic  — Anthropic Claude
#   ollama     — Local Ollama
#   gemini     — Google Gemini

# model_list:
#   - model_name: "gpt-4o"
#     model: "openai/gpt-4o"
#     api_key: "sk-..."
#     api_base: "https://api.openai.com/v1"
#     max_tokens: 4096
#
#   - model_name: "claude-sonnet"
#     model: "anthropic/claude-sonnet-4-20250514"
#     api_key: "sk-ant-..."
#     max_tokens: 4096
#
#   - model_name: "llama-local"
#     model: "ollama/llama3.2"
#     api_base: "http://localhost:11434"
#     max_tokens: 4096
#
#   - model_name: "gemini-flash"
#     model: "gemini/gemini-2.0-flash"
#     api_key: "AIza..."
#     max_tokens: 4096
#
#   # OpenRouter (OpenAI-compatible protocol, custom base URL)
#   - model_name: "deepseek-r1"
#     model: "openrouter/deepseek/deepseek-r1"
#     api_key: "sk-or-..."
#     api_base: "https://openrouter.ai/api/v1"
#     max_tokens: 4096
#
#   # Groq (OpenAI-compatible protocol)
#   - model_name: "groq-llama"
#     model: "groq/llama-3.3-70b-versatile"
#     api_key: "gsk_..."
#     api_base: "https://api.groq.com/openai/v1"
#     max_tokens: 4096
#
#   # Fallback configuration
#   - model_name: "gpt-primary"
#     model: "openai/gpt-4o"
#     api_key: "sk-..."
#     fallback_models:
#       - "gpt-4o-mini"
#       - "gpt-3.5-turbo"

# ═══════════════════════════════════════════════════════════════════
# LEGACY PROVIDERS — Still supported for backward compatibility
# ═══════════════════════════════════════════════════════════════════
# If model_list is empty, these are used instead.

# Default provider to use (openai, anthropic, ollama, gemini, openrouter, groq, etc.)
default_provider: "openai"

# LLM Providers — configure at least one
providers:
  # OpenAI
  openai:
    api_key: ""              # sk-...
    model: "gpt-4o"          # gpt-4, gpt-4o, gpt-4o-mini
    max_tokens: 4096

  # Anthropic
  anthropic:
    api_key: ""              # sk-ant-...
    model: "claude-sonnet-4-20250514"  # claude-3-5-sonnet, claude-sonnet-4-20250514
    max_tokens: 4096

  # Ollama (local)
  ollama:
    host: "http://localhost:11434"
    model: "llama3.2"        # any model pulled in Ollama
    max_tokens: 4096

  # Google Gemini
  gemini:
    api_key: ""              # AIza...
    model: "gemini-2.0-flash" # gemini-2.0-flash, gemini-1.5-pro
    max_tokens: 4096

  # OpenRouter (aggregates many providers)
  openrouter:
    api_key: ""              # sk-or-...
    model: "deepseek/deepseek-r1"
    max_tokens: 4096

  # Groq (fast inference)
  groq:
    api_key: ""              # gsk_...
    model: "llama-3.3-70b-versatile"
    max_tokens: 4096

  # Zhipu (GLM - Chinese models)
  zhipu:
    api_key: ""              # glm-...
    model: "glm-4"
    max_tokens: 4096

  # DeepSeek
  deepseek:
    api_key: ""              # sk-...
    model: "deepseek-chat"
    max_tokens: 4096

  # Moonshot (Kimi - Chinese models)
  moonshot:
    api_key: ""              # sk-...
    model: "kimi-latest"
    max_tokens: 4096

  # Cerebras (fastest inference)
  cerebras:
    api_key: ""              # cbrs-...
    model: "llama-3.3-70b"
    max_tokens: 4096

  # NVIDIA NIM
  nvidia:
    api_key: ""              # nvapi-...
    model: "nvidia/llama-3.1-nemotron-70b-instruct"
    max_tokens: 4096

  # LiteLLM Proxy
  litellm:
    api_key: ""              # Optional: for LiteLLM proxy
    endpoint: "http://localhost:4000/v1"
    model: "gpt-4"
    max_tokens: 4096

  # vLLM (self-hosted)
  vllm:
    endpoint: "http://localhost:8000/v1"
    api_key: ""              # Optional: if vLLM requires auth
    model: "llama-3.2"
    max_tokens: 4096

  # Mistral
  mistral:
    api_key: ""              # sm-...
    model: "mistral-large-latest"
    max_tokens: 4096

  # Volcanic Engine (ByteDance)
  volcanic:
    api_key: ""              # ark-...
    model: "doubao-1-5-pro-32k"
    max_tokens: 4096

  # Qwen (Alibaba)
  qwen:
    api_key: ""              # sk-...
    model: "qwen-turbo"
    max_tokens: 4096

  # Anthropic
  anthropic:
    api_key: ""              # sk-ant-...
    model: "claude-sonnet-4-20250514"  # claude-3-5-sonnet, claude-sonnet-4-20250514
    max_tokens: 4096

  # Ollama (local)
  ollama:
    host: "http://localhost:11434"
    model: "llama3.2"        # any model pulled in Ollama
    max_tokens: 4096

  # Google Gemini
  gemini:
    api_key: ""              # AIza...
    model: "gemini-2.0-flash" # gemini-2.0-flash, gemini-1.5-pro
    max_tokens: 4096

# ═══════════════════════════════════════════════════════════════════
# AGENTS — Global agent behavior and security
# ═══════════════════════════════════════════════════════════════════

stats:
  enabled: true # Enable cost and usage tracking

agents:
  defaults:
    # Workspace directory for agent operations
    # Use "." for current directory, or an absolute path
    workspace: "."
    
    # When true, all file and command operations are restricted to the workspace.
    # Attempts to access paths outside the workspace will result in an error.
    # Set to false to disable this sandbox (CAUTION).
    restrict_to_workspace: true

# Agent settings
agent:
  system_prompt: "You are Wonderpus, a helpful AI assistant. Be concise and accurate. You have access to tools; use them when necessary to fulfill the user's request."
  max_context_tokens: 8000   # max tokens in conversation context
  temperature: 0.7

# Tool settings
tools:
  enabled: true
  timeout_seconds: 30
  
  # Allowed paths for file operations (if agents.defaults.restrict_to_workspace is false)
  allowed_paths:
    - "."
    - "/tmp"
    
  # Allowed shell commands for agent execution
  shell_whitelist:
    - "ls"
    - "dir"
    - "cat"
    - "type"
    - "echo"
    - "grep"
    - "find"
    - "git"
    
  # Additional domains or IPs to block for HTTP requests (prevents SSRF)
  # Localhost and private IPs (10.x, 172.16.x, 192.168.x) are blocked by default.
  ssrf_blocklist:
    - "internal.company.com"
    - "admin.local"
    - "grep"
    - "find"
    - "pwd"
    - "date"
    - "whoami"

  # Skills system configuration
  skills:
    enabled: true
    # Global skills directory (~/.wunderpus/skills)
    global_skills_path: "~/.wunderpus/skills"
    # Built-in skills directory (shipped with wunderpus)
    builtin_skills_path: "./skills"
    
    # Skill registries
    registries:
      # ClawHub registry (https://clawhub.ai)
      clawhub:
        enabled: false            # Set to true to enable
        base_url: "https://clawhub.ai"
        auth_token: ""           # Optional: for elevated rate limits

  # Web search providers (DuckDuckGo is free fallback)
  # Priority: Brave > Tavily > DuckDuckGo
  search:
    brave_api_key: ""            # Get from https://brave.com/search/api/
    tavily_api_key: ""           # Get from https://tavily.com/api/
    tavily_base_url: ""         # Optional: custom Tavily endpoint
    perplexity_key: ""          # Get from https://www.perplexity.ai/

# Security
security:
  sanitization_enabled: true
  audit_db_path: "wonderpus_audit.db"

# Logging
logging:
  level: "info"              # debug, info, warn, error
  format: "json"             # json, text
  output: "stderr"           # stderr, stdout, or file path

# Health check server
server:
  health_port: 8080

# Heartbeat — Periodic task execution
# Wunderpus reads HEARTBEAT.md periodically and executes tasks
heartbeat:
  enabled: true           # Set to false to disable heartbeat
  interval: 30            # Interval in minutes (minimum: 5)

# ═══════════════════════════════════════════════════════════════════
# GENESIS — Autonomous Economic Agent feature flags
# All disabled by default. Enable progressively after Phase gate tests pass.
# ═══════════════════════════════════════════════════════════════════
genesis:
  # Phase 1 — Recursive Self-Improvement (RSI)
  rsi_enabled: false                    # Enable the RSI Ouroboros loop
  rsi_firewall_enabled: true            # RSI can only modify internal/ (NEVER disable in production)
  rsi_self_referential_enabled: false   # Allow RSI to modify internal/rsi/ (Phase 4 unlock only)
  rsi_fitness_threshold: 0.05           # Minimum fitness delta to accept an RSI proposal (0.0–1.0)

  # Phase 2 — Autonomous Goal Synthesis (AGS)
  ags_enabled: false                    # Enable self-generated goal synthesis

  # Phase 3 — Unbounded Autonomous Action (UAA)
  uaa_enabled: false                    # Enable full UAA gate (classify → trust → shadow → execute)

  # Phase 3 — Resource Acquisition (RA)
  ra_enabled: false                     # Enable cloud provisioning via RA module

  # Trust budget
  trust_budget_max: 1000                # Maximum trust points (resets on human JWT)
  trust_regen_per_hour: 10             # Passive regen (1 point per 360 seconds)

  # Spend cap — hard limit, checked before any cloud provision call
  max_daily_spend_usd: 10.0            # Maximum allowed cloud spend per day in USD

  # JWT reset secret must live in this env var ONLY (agent cannot read it)
  jwt_secret_env: "WUNDERPUS_JWT_SECRET"

  # External host allowlist — hosts classified as Tier 3 instead of Tier 4
  external_host_allowlist: []
    # - "api.example.com"

  # Database paths (resolved relative to home if empty/relative)
  audit_log_db_path: ""      # Default: ~/.wunderpus/wunderpus_genesis_audit.db
  profiler_db_path: ""       # Default: ~/.wunderpus/wunderpus_profiler.db
  trust_budget_db_path: ""   # Default: ~/.wunderpus/wunderpus_trust.db
  profiler_pprof_port: 0     # pprof port (0 = disabled, recommended for production)


