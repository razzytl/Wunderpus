#
#   - model_name: "gemini-flash"
#     model: "gemini/gemini-2.0-flash"
#     api_key: "AIza..."
#     max_tokens: 4096
#
#   # OpenRouter (OpenAI-compatible protocol, custom base URL)
#   - model_name: "deepseek-r1"
