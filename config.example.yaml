# Wonderpus Configuration
# Copy to config.yaml and fill in your API keys

# ═══════════════════════════════════════════════════════════════════
# MODEL LIST — Vendor-agnostic model configuration (RECOMMENDED)
# ═══════════════════════════════════════════════════════════════════
# Add any provider with zero code changes. Protocol is auto-detected
# from the model prefix, or set explicitly via "protocol".
#
# Supported protocols:
#   openai     — OpenAI, OpenRouter, Groq, Together, Mistral, vLLM, etc.
#   anthropic  — Anthropic Claude
#   ollama     — Local Ollama
#   gemini     — Google Gemini

