# Wonderpus Configuration
# Copy to config.yaml and fill in your API keys

# LLM Providers — configure at least one
providers:
  # OpenAI
  openai:
    api_key: ""              # sk-...
    model: "gpt-4o"          # gpt-4, gpt-4o, gpt-4o-mini
    max_tokens: 4096

  # Anthropic
  anthropic:
    api_key: ""              # sk-ant-...
    model: "claude-sonnet-4-20250514"  # claude-3-5-sonnet, claude-sonnet-4-20250514
    max_tokens: 4096

  # Ollama (local)
  ollama:
    host: "http://localhost:11434"
    model: "llama3.2"        # any model pulled in Ollama
    max_tokens: 4096

  # Google Gemini
  gemini:
    api_key: ""              # AIza...
    model: "gemini-2.0-flash" # gemini-2.0-flash, gemini-1.5-pro
    max_tokens: 4096

# Default provider to use (openai, anthropic, ollama, gemini)
default_provider: "openai"

# Agent settings
agent:
  system_prompt: "You are Wonderpus, a helpful AI assistant. Be concise and accurate. You have access to tools; use them when necessary to fulfill the user's request."
  max_context_tokens: 8000   # max tokens in conversation context
  temperature: 0.7

# Tool settings
tools:
  enabled: true
  timeout_seconds: 30
  allowed_paths:
    - "."                    # only allow file operations in current directory
  shell_whitelist:
    - "ls"
    - "dir"
    - "cat"
    - "type"
    - "echo"
    - "head"
    - "tail"
    - "wc"
    - "grep"
    - "find"
    - "pwd"
    - "date"
    - "whoami"

# Security
security:
  sanitization_enabled: true
  audit_db_path: "wonderpus_audit.db"

# Logging
logging:
  level: "info"              # debug, info, warn, error
  format: "json"             # json, text
  output: "stderr"           # stderr, stdout, or file path

# Health check server
server:
  health_port: 8080
