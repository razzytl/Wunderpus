version: '3.8'

services:
  wonderpus:
    build: .
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      - WONDERPUS_ENCRYPTION_KEY=${WONDERPUS_ENCRYPTION_KEY}
      - WONDERPUS_OPENAI_API_KEY=${WONDERPUS_OPENAI_API_KEY}
    volumes:
      - ./data:/app/data
    networks:
      - wonderpus-net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - wonderpus-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - wonderpus-net
    restart: unless-stopped

networks:
  wonderpus-net:
    driver: bridge
