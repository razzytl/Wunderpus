version: '3.8'

services:
  wonderpus:
    build: .
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      - WONDERPUS_ENCRYPTION_KEY=${WONDERPUS_ENCRYPTION_KEY}
      - WONDERPUS_OPENAI_API_KEY=${WONDERPUS_OPENAI_API_KEY}
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
